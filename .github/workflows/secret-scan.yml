name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run repo secret scan
        shell: pwsh
        run: ./scripts/scan-secrets.ps1 -Ci
