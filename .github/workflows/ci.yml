name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CSN_DATA_MODE: fixture
      DATABASE_URL: postgresql://user@localhost:5432/csn?schema=public
      DIRECT_URL: postgresql://user@localhost:5432/csn?schema=public
      NEXT_PUBLIC_APP_URL: https://cardshownation.com
      ADMIN_PASSWORD: ci-password

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Web tests
        run: npm run test:web

      - name: Build
        run: npm run build
